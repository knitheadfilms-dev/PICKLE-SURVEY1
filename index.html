<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mango Pickle Survey</title>
</head>
<body style="margin:0;">
<!-- Mango Pickle Survey — a one-question-at-a-time survey where every answer lights a star -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --cream-bg:#FFE9B8;
    --cream-card:#FFFDF6;
    --sienna:#FF7A29;
    --sienna-deep:#E8590C;
    --sienna-soft:#FFCB8A;
    --leaf-green:#4C9A2A;
    --leaf-green-deep:#3A7A1E;
    --ink:#3A2A1C;
    --muted:#9C7A4A;
    /* legacy aliases used throughout the file */
    --navy-deep:var(--cream-bg);
    --navy-card:var(--cream-card);
    --navy-line:var(--sienna-soft);
    --gold:var(--sienna);
    --violet:var(--leaf-green);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--cream-bg); }
  #cf-root{
    position:relative;
    min-height:100vh;
    background:
      radial-gradient(circle at 90% 6%, rgba(76,154,42,.20) 0%, transparent 46%),
      radial-gradient(circle at 4% 96%, rgba(76,154,42,.16) 0%, transparent 48%),
      linear-gradient(150deg, #FFD866 0%, #FFC24B 30%, #FF9F3D 60%, #FF8639 100%);
    background-size:160% 160%, 160% 160%, 220% 220%;
    animation:cf-bg-shift 24s ease-in-out infinite;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  @keyframes cf-bg-shift{
    0%,100%{ background-position:0% 20%, 100% 80%, 0% 30%; }
    50%{ background-position:20% 40%, 80% 60%, 100% 70%; }
  }

  /* floating ambient mangoes */
  .cf-mango{
    position:absolute;
    animation:cf-mango-float ease-in-out infinite;
    opacity:.62;
    filter:drop-shadow(0 10px 18px rgba(122,46,28,.20));
  }
  @keyframes cf-mango-float{
    0%,100%{ transform:translateY(0) rotate(-3deg); }
    50%{ transform:translateY(-12px) rotate(3deg); }
  }

  .cf-wrap{
    position:relative;
    z-index:2;
    width:100%;
    max-width:560px;
    margin:40px auto;
    padding:44px 44px 38px;
    background:var(--cream-card);
    border-radius:28px;
    box-shadow:0 30px 60px -25px rgba(232,89,12,.28), 0 2px 8px rgba(232,89,12,.06),
      0 0 0 1px rgba(255,122,41,.09), inset 0 0 0 5px rgba(255,122,41,.045);
    border:1px solid rgba(255,122,41,.10);
  }
  @media (max-width:640px){
    .cf-wrap{ margin:0; border-radius:0; min-height:100vh; padding:32px 22px 28px; box-shadow:none; }
  }

  /* progress constellation */
  .cf-progress{ width:100%; height:56px; margin-bottom:36px; }
  .cf-progress-line{ stroke:rgba(232,89,12,.16); stroke-width:2; fill:none; }
  .cf-progress-line-fill{ stroke:var(--gold); stroke-width:2; fill:none; stroke-linecap:round;
    transition:stroke-dashoffset .6s cubic-bezier(.65,0,.35,1); }
  .cf-node{ transition:all .5s cubic-bezier(.65,0,.35,1); }
  .cf-node-ring{ fill:none; stroke:rgba(232,89,12,.22); stroke-width:1.5; }
  .cf-node-core{ fill:var(--navy-card); stroke:rgba(232,89,12,.3); stroke-width:1.5; transition:all .4s ease; }
  .cf-node.active .cf-node-core{ fill:var(--gold); stroke:var(--gold); }
  .cf-node.active .cf-node-ring{ stroke:var(--gold); opacity:.4; }
  .cf-node.done .cf-node-core{ fill:var(--violet); stroke:var(--violet); }

  .cf-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--sienna-deep);
    margin:0 0 12px;
    padding-bottom:10px;
    border-bottom:1px solid rgba(255,122,41,.18);
    display:inline-block;
  }

  .cf-step{
    animation:cf-in .5s cubic-bezier(.16,1,.3,1);
  }
  @keyframes cf-in{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  h2.cf-q{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(22px,4vw,30px);
    line-height:1.25;
    margin:0 0 6px;
  }
  .cf-sub{
    color:var(--muted);
    font-size:14px;
    margin:0 0 28px;
  }

  /* star rating */
  .cf-stars{ display:flex; gap:14px; margin-bottom:8px; }
  .cf-star-btn{
    background:none; border:none; cursor:pointer; padding:4px;
    color:var(--navy-line);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1), color .25s ease;
  }
  .cf-star-btn svg{ width:38px; height:38px; display:block; }
  .cf-star-btn.lit{ color:var(--gold); transform:scale(1.12) rotate(-6deg); }
  .cf-star-btn:hover{ transform:scale(1.15); }

  /* NPS scale */
  .cf-nps{ display:flex; gap:8px; flex-wrap:wrap; }
  .cf-nps button{
    width:44px; height:44px; border-radius:50%;
    border:1.5px solid var(--navy-line);
    background:transparent; color:var(--ink);
    font-family:'IBM Plex Mono',monospace; font-size:14px;
    cursor:pointer; transition:all .25s ease;
  }
  .cf-nps button.sel{
    background:var(--violet); border-color:var(--violet); color:#0A0F1E;
    box-shadow:0 0 0 4px rgba(139,127,214,.25);
    transform:scale(1.08);
  }
  .cf-nps-labels{ display:flex; justify-content:space-between; color:var(--muted); font-size:12px; margin-top:10px; }

  /* chips */
  .cf-chips{ display:flex; flex-wrap:wrap; gap:10px; }
  .cf-chip{
    padding:10px 16px; border-radius:999px;
    border:1.5px solid var(--navy-line); background:transparent;
    color:var(--ink); font-size:14px; cursor:pointer;
    transition:all .2s ease;
  }
  .cf-chip.sel{
    background:rgba(255,122,41,.09); border-color:var(--gold); color:var(--sienna-deep);
  }

  /* textarea */
  .cf-field{
    width:100%; background:#FAF2E5; border:1.5px solid var(--navy-line);
    border-radius:12px; padding:14px 16px; color:var(--ink);
    font-family:'Inter',sans-serif; font-size:15px; resize:none;
    transition:border-color .2s ease;
  }
  .cf-field:focus{ outline:none; border-color:var(--sienna); }

  /* nav buttons */
  .cf-nav{ display:flex; justify-content:space-between; align-items:center; margin-top:32px; }
  .cf-btn{
    font-family:'Inter',sans-serif; font-weight:600; font-size:14px;
    padding:12px 22px; border-radius:10px; cursor:pointer;
    border:none; transition:all .2s ease;
  }
  .cf-btn-primary{
    background:linear-gradient(155deg, #C86A3F 0%, var(--sienna) 55%, var(--sienna-deep) 100%);
    color:#FFF8EC;
    box-shadow:0 1px 0 rgba(255,255,255,.18) inset, 0 8px 18px -6px rgba(232,89,12,.4);
  }
  .cf-btn-primary:hover{ transform:translateY(-1px); box-shadow:0 10px 22px rgba(232,89,12,.24); }
  .cf-btn-primary:disabled{ opacity:.35; cursor:not-allowed; transform:none; box-shadow:none; }
  .cf-btn-ghost{ background:none; color:var(--muted); }
  .cf-btn-ghost:hover{ color:var(--ink); }

  /* welcome + final */
  .cf-center{ text-align:center; padding:48px 0 16px; }
  .cf-center h1{
    font-family:'Fraunces',serif; font-weight:600;
    font-size:clamp(28px,5vw,38px); margin:0 0 14px;
  }
  .cf-center p{ color:var(--muted); font-size:15px; max-width:420px; margin:0 auto 30px; line-height:1.6; }

  .cf-canvas-wrap{ display:flex; justify-content:center; margin:8px 0 24px; }

  .cf-recap{ text-align:left; background:#FAF2E5; border:1px solid var(--navy-line);
    border-radius:12px; padding:18px 20px; margin-bottom:24px; }
  .cf-recap div{ font-size:13px; color:var(--muted); margin-bottom:6px; }
  .cf-recap div:last-child{ margin-bottom:0; }
  .cf-recap b{ color:var(--ink); font-weight:600; }

  .cf-tiny{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-align:center; margin-top:18px; }
</style>

<div id="cf-root">
  <div id="cf-mangoes"></div>
  <div class="cf-wrap">
    <svg class="cf-progress" id="cf-progress-svg" viewBox="0 0 560 56"></svg>
    <div id="cf-step-host"></div>
  </div>
</div>

<script>
(function(){
  const NAVY_LINE = 'rgba(232,89,12,.22)';

  // ---------- floating ambient mangoes (premium, corner-anchored) ----------
  const mangoSvg = (idx) => `
    <svg viewBox="0 0 100 100" width="100%" height="100%" style="overflow:visible">
      <defs>
        <radialGradient id="cf-mango-grad-${idx}" cx="32%" cy="26%" r="80%">
          <stop offset="0%" stop-color="#FBE3A8"/>
          <stop offset="35%" stop-color="#E8A54F"/>
          <stop offset="68%" stop-color="#C1682E"/>
          <stop offset="100%" stop-color="#7A2E1C"/>
        </radialGradient>
        <radialGradient id="cf-mango-halo-${idx}" cx="50%" cy="50%" r="50%">
          <stop offset="55%" stop-color="rgba(232,165,79,0)"/>
          <stop offset="100%" stop-color="rgba(232,165,79,.35)"/>
        </radialGradient>
      </defs>
      <circle cx="50" cy="50" r="49" fill="url(#cf-mango-halo-${idx})"/>
      <path d="M50 8 C72 8 88 28 86 52 C84 76 68 92 48 92 C26 92 12 74 14 50 C16 26 30 8 50 8 Z"
        fill="url(#cf-mango-grad-${idx})" stroke="#6B2A18" stroke-width="1.25"/>
      <path d="M28 34 C38 23 58 20 71 29" fill="none" stroke="#FFF3D6" stroke-width="4" stroke-linecap="round" opacity=".55"/>
      <ellipse cx="38" cy="30" rx="9" ry="5" fill="#FFF6E0" opacity=".35"/>
      <path d="M48 8 C46 1 38 -3 31 1" fill="none" stroke="#4C9A2A" stroke-width="4" stroke-linecap="round"/>
    </svg>`;
  const mangoHost = document.getElementById('cf-mangoes');
  // Anchored to each corner with a fixed inset so they always stay fully in frame,
  // regardless of viewport size — no more clipped/off-screen fruit.
  const mangoSpecs = [
    { corner:'tl', size:96,  inset:18, dur:'9s',  delay:'0s'   },
    { corner:'tr', size:104, inset:16, dur:'10s', delay:'.8s'  },
    { corner:'bl', size:88,  inset:20, dur:'11s', delay:'1.6s' },
    { corner:'br', size:80,  inset:22, dur:'8s',  delay:'2.2s' }
  ];
  mangoSpecs.forEach((m,i)=>{
    const el = document.createElement('div');
    el.className = 'cf-mango';
    el.style.width = m.size+'px';
    el.style.height = m.size+'px';
    if(m.corner.includes('t')) el.style.top = m.inset+'px'; else el.style.bottom = m.inset+'px';
    if(m.corner.includes('l')) el.style.left = m.inset+'px'; else el.style.right = m.inset+'px';
    el.style.animationDuration = m.dur;
    el.style.animationDelay = m.delay;
    el.innerHTML = mangoSvg(i);
    mangoHost.appendChild(el);
  });

  // ---------- state ----------
  const steps = ['welcome','mangoLike','brand','decider','homeAway','spend','frequency','online','tryPremium','final'];
  const progressSteps = ['mangoLike','brand','decider','homeAway','spend','frequency','online','tryPremium']; // 8 nodes
  let stepIndex = 0;
  const answers = {
    mangoLike:null, brand:null, brandOther:'', decider:null, homeAway:null,
    spend:null, frequency:null, online:null, onlineWhere:null, tryPremium:null
  };

  const brandOptions = ['Priya','Mother\'s Recipe','Nilon\'s','Local shop brand','Homemade only','Other'];
  const deciderOptions = ['Me','Mom','Spouse','Whole family','Whoever\'s shopping'];
  const spendOptions = ['Under ₹100','₹100–300','₹300–500','₹500+'];
  const freqOptions = ['Weekly','Monthly','Every 2–3 months','Rarely'];
  const whereOptions = ['Local store','Supermarket','Homemade','Relatives / friends'];

  const host = document.getElementById('cf-step-host');
  const progressSvg = document.getElementById('cf-progress-svg');

  function currentStepName(){ return steps[stepIndex]; }

  // Escapes quotes/backslashes so option text (e.g. "Mother's Recipe") can be
  // safely embedded inside an onclick="...('...')" JS string without breaking it.
  function esc(s){ return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

  function renderProgress(){
    const name = currentStepName();
    const pIdx = progressSteps.indexOf(name); // -1 on welcome/final
    const n = progressSteps.length;
    const w = 560, y = 28, margin = 40;
    const gap = (w - margin*2) / (n-1);
    let svg = '';
    // base line
    svg += `<line class="cf-progress-line" x1="${margin}" y1="${y}" x2="${w-margin}" y2="${y}"/>`;
    // fill line
    const filledCount = pIdx === -1 ? (name==='final' ? n-1 : 0) : pIdx;
    const fillX = margin + gap*filledCount;
    svg += `<line class="cf-progress-line-fill" x1="${margin}" y1="${y}" x2="${fillX}" y2="${y}"/>`;
    for(let i=0;i<n;i++){
      const cx = margin + gap*i;
      let cls = 'cf-node';
      if(i < pIdx || name==='final') cls += ' done';
      else if(i === pIdx) cls += ' active';
      svg += `<g class="${cls}">
        <circle class="cf-node-ring" cx="${cx}" cy="${y}" r="10"/>
        <circle class="cf-node-core" cx="${cx}" cy="${y}" r="5"/>
      </g>`;
    }
    progressSvg.innerHTML = svg;
  }

  function go(delta){
    stepIndex = Math.max(0, Math.min(steps.length-1, stepIndex+delta));
    render();
  }

  function canAdvance(){
    switch(currentStepName()){
      case 'mangoLike': return answers.mangoLike !== null;
      case 'brand': return answers.brand !== null && (answers.brand !== 'Other' || answers.brandOther.trim().length>0);
      case 'decider': return answers.decider !== null;
      case 'homeAway': return answers.homeAway !== null;
      case 'spend': return answers.spend !== null;
      case 'frequency': return answers.frequency !== null;
      case 'online': return answers.online !== null && (answers.online==='Yes' || answers.onlineWhere !== null);
      case 'tryPremium': return answers.tryPremium !== null;
      default: return true;
    }
  }

  function render(){
    renderProgress();
    const name = currentStepName();
    let html = '';

    if(name === 'welcome'){
      html = `
        <div class="cf-step cf-center">
          <div class="cf-eyebrow">Mango Pickle Survey · 2 minutes</div>
          <h1>Help us map<br>India's pickle jar.</h1>
          <p>Eight quick questions about how your household buys and eats mango pickle. Every answer lights a star on your own pickle profile.</p>
          <button class="cf-btn cf-btn-primary" onclick="cfApp.go(1)">Begin →</button>
        </div>`;
    }
    else if(name === 'mangoLike'){
      const opts = ['Love it','It\'s okay','Not really'];
      let chips = opts.map(o=>`<button class="cf-chip ${answers.mangoLike===o?'sel':''}" onclick="cfApp.setSingle('mangoLike','${esc(o)}')">${o}</button>`).join('');
      html = questionShell('01','The basics','Do you like mango pickle?','', `<div class="cf-chips">${chips}</div>`, true);
    }
    else if(name === 'brand'){
      let chips = brandOptions.map(o=>`<button class="cf-chip ${answers.brand===o?'sel':''}" onclick="cfApp.setSingle('brand','${esc(o)}')">${o}</button>`).join('');
      const otherField = answers.brand === 'Other'
        ? `<input class="cf-field" style="margin-top:14px" placeholder="Which brand?" value="${answers.brandOther}" oninput="cfApp.setBrandOther(this.value)"/>` : '';
      html = questionShell('02','Purchase','Which pickle brand do you usually buy?','', `<div class="cf-chips">${chips}</div>${otherField}`, true);
    }
    else if(name === 'decider'){
      let chips = deciderOptions.map(o=>`<button class="cf-chip ${answers.decider===o?'sel':''}" onclick="cfApp.setSingle('decider','${esc(o)}')">${o}</button>`).join('');
      html = questionShell('03','At home','Who decides which pickle to buy at home?','', `<div class="cf-chips">${chips}</div>`, true);
    }
    else if(name === 'homeAway'){
      const opts = ['At Home','Away from Home'];
      let chips = opts.map(o=>`<button class="cf-chip ${answers.homeAway===o?'sel':''}" onclick="cfApp.setSingle('homeAway','${esc(o)}')">${o}</button>`).join('');
      html = questionShell('04','Living situation','Do you currently live at home, or away from home?','', `<div class="cf-chips">${chips}</div>`, true);
    }
    else if(name === 'spend'){
      let chips = spendOptions.map(o=>`<button class="cf-chip ${answers.spend===o?'sel':''}" onclick="cfApp.setSingle('spend','${esc(o)}')">${o}</button>`).join('');
      html = questionShell('05','Spend','How much do you typically spend on pickle?','Per jar or per month, whichever feels right.', `<div class="cf-chips">${chips}</div>`, true);
    }
    else if(name === 'frequency'){
      let chips = freqOptions.map(o=>`<button class="cf-chip ${answers.frequency===o?'sel':''}" onclick="cfApp.setSingle('frequency','${esc(o)}')">${o}</button>`).join('');
      html = questionShell('06','Habit','How often do you buy pickle?','', `<div class="cf-chips">${chips}</div>`, true);
    }
    else if(name === 'online'){
      const opts = ['Yes','No'];
      let chips = opts.map(o=>`<button class="cf-chip ${answers.online===o?'sel':''}" onclick="cfApp.setOnline('${esc(o)}')">${o==='Yes'?'Yes, online':'No'}</button>`).join('');
      let whereBlock = '';
      if(answers.online === 'No'){
        let whereChips = whereOptions.map(o=>`<button class="cf-chip ${answers.onlineWhere===o?'sel':''}" onclick="cfApp.setSingle('onlineWhere','${esc(o)}')">${o}</button>`).join('');
        whereBlock = `<p class="cf-sub" style="margin-top:20px;">If not online, where from?</p><div class="cf-chips">${whereChips}</div>`;
      }
      html = questionShell('07','Channel','Do you buy pickle online?','', `<div class="cf-chips">${chips}</div>${whereBlock}`, true);
    }
    else if(name === 'tryPremium'){
      const opts = ['Yes, definitely','Maybe','Not interested'];
      let chips = opts.map(o=>`<button class="cf-chip ${answers.tryPremium===o?'sel':''}" onclick="cfApp.setSingle('tryPremium','${esc(o)}')">${o}</button>`).join('');
      html = `
        <div class="cf-step">
          <div class="cf-eyebrow">08 · Last one</div>
          <h2 class="cf-q">Would you try a homemade premium mango pickle?</h2>
          <p class="cf-sub">&nbsp;</p>
          <div class="cf-chips">${chips}</div>
          <div class="cf-nav">
            <button class="cf-btn cf-btn-ghost" onclick="cfApp.go(-1)">Back</button>
            <button class="cf-btn cf-btn-primary" id="cf-next-btn" onclick="cfApp.submit()">Send response ✦</button>
          </div>
        </div>`;
    }
    else if(name === 'final'){
      html = `
        <div class="cf-step cf-center">
          <div class="cf-eyebrow">Complete</div>
          <h1>Your pickle profile<br>is formed.</h1>
          <div class="cf-canvas-wrap">
            <svg id="cf-final-svg" width="260" height="200" viewBox="0 0 260 200"></svg>
          </div>
          <div class="cf-recap" id="cf-recap"></div>
          <button class="cf-btn cf-btn-primary" onclick="cfApp.reset()">Submit another response</button>
          <div class="cf-tiny">Front-end template — wire the submit() call to your own Sheet, Apps Script, or endpoint to store real responses.</div>
        </div>`;
    }

    host.innerHTML = html;
    updateNextState();
    if(name === 'final') drawFinal();
  }

  function questionShell(num, eyebrow, q, sub, body, showNav){
    return `
      <div class="cf-step">
        <div class="cf-eyebrow">${num} · ${eyebrow}</div>
        <h2 class="cf-q">${q}</h2>
        <p class="cf-sub">${sub || '&nbsp;'}</p>
        ${body}
        ${showNav ? `
        <div class="cf-nav">
          <button class="cf-btn cf-btn-ghost" onclick="cfApp.go(-1)">Back</button>
          <button class="cf-btn cf-btn-primary" id="cf-next-btn" onclick="cfApp.go(1)">Next →</button>
        </div>` : ''}
      </div>`;
  }

  function updateNextState(){
    const btn = document.getElementById('cf-next-btn');
    if(btn) btn.disabled = !canAdvance();
  }

  function drawFinal(){
    const svg = document.getElementById('cf-final-svg');
    // derive pseudo-random but deterministic star positions from answers
    const seedParts = [answers.mangoLike, answers.brand, answers.decider, answers.homeAway,
      answers.spend, answers.frequency, answers.online, answers.tryPremium];
    let seed = 17;
    seedParts.forEach((s,i)=>{ if(s){ for(let c=0;c<s.length;c++) seed += s.charCodeAt(c)*(i+2); } });
    function rand(i){ const x = Math.sin(seed*i*12.9898)*43758.5453; return x - Math.floor(x); }
    const n = progressSteps.length;
    const pts = [];
    for(let i=0;i<n;i++){
      pts.push({ x: 25 + rand(i+1)*210, y: 20 + rand(i+9)*160 });
    }
    let lines = '';
    for(let i=0;i<pts.length-1;i++){
      lines += `<line x1="${pts[i].x}" y1="${pts[i].y}" x2="${pts[i+1].x}" y2="${pts[i+1].y}"
        stroke="${NAVY_LINE}" stroke-width="1" opacity="0"
        style="animation:cf-line-in .5s ease forwards; animation-delay:${i*0.12}s"/>`;
    }
    let stars = pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="${i%3===0?3.5:2.5}" fill="${i%2===0?'#F2924B':'#8FA24E'}"
      opacity="0" style="animation:cf-star-in .4s ease forwards; animation-delay:${i*0.12+0.1}s"/>`).join('');

    svg.innerHTML = `<style>
      @keyframes cf-line-in{ to{ opacity:.6; } }
      @keyframes cf-star-in{ 0%{opacity:0; transform:scale(0);} 100%{opacity:1; transform:scale(1);} }
      circle{ transform-box: fill-box; transform-origin:center; }
    </style>${lines}${stars}`;

    const brandLabel = answers.brand === 'Other' ? (answers.brandOther || 'Other') : answers.brand;
    const onlineLabel = answers.online === 'Yes' ? 'Yes, online' : `No — buys from ${answers.onlineWhere || '—'}`;

    document.getElementById('cf-recap').innerHTML = `
      <div>Likes mango pickle: <b>${answers.mangoLike || '—'}</b></div>
      <div>Usual brand: <b>${brandLabel || '—'}</b></div>
      <div>Decides at home: <b>${answers.decider || '—'}</b></div>
      <div>Living situation: <b>${answers.homeAway || '—'}</b></div>
      <div>Typical spend: <b>${answers.spend || '—'}</b></div>
      <div>Buys: <b>${answers.frequency || '—'}</b></div>
      <div>Buys online: <b>${onlineLabel}</b></div>
      <div>Would try premium homemade: <b>${answers.tryPremium || '—'}</b></div>
    `;
  }

  window.cfApp = {
    go,
    setSingle(field, value){ answers[field] = value; render(); },
    setBrandOther(v){ answers.brandOther = v; updateNextState(); },
    setOnline(v){ answers.online = v; if(v==='Yes') answers.onlineWhere = null; render(); },
    submit(){
      // ---- PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL BELOW ----
      // See the setup steps shared alongside this file. Once you deploy your
      // Apps Script as a Web App, replace the empty string with that URL.
      const ENDPOINT_URL = 'https://script.google.com/macros/s/AKfycbw1jstfHJsXS50a0aW5snkaxOXEQFSmkH5yokgkag_KGnM002zcIozxRwD2hUIEkw4GQQ/exec';

      if(ENDPOINT_URL){
        fetch(ENDPOINT_URL, {
          method:'POST',
          mode:'no-cors', // Apps Script Web Apps don't return CORS headers; no-cors lets the write still happen
          headers:{ 'Content-Type':'text/plain' },
          body: JSON.stringify(answers)
        }).catch(err => console.error('Could not save response:', err));
      } else {
        console.warn('No ENDPOINT_URL set yet — response was not saved anywhere. See setup instructions.');
      }
      console.log('Survey submitted:', answers);
      stepIndex = steps.indexOf('final');
      render();
    },
    reset(){
      Object.assign(answers, {
        mangoLike:null, brand:null, brandOther:'', decider:null, homeAway:null,
        spend:null, frequency:null, online:null, onlineWhere:null, tryPremium:null
      });
      stepIndex = 0;
      render();
    }
  };

  render();
})();
</script>
